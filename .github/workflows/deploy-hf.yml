name: Deploy to HuggingFace Spaces

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 huggingface_hub
        run: pip install huggingface_hub --break-system-packages

      - name: 推送到 HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'EOF'
          from huggingface_hub import HfApi
          import os, shutil

          api = HfApi()
          repo_id = "libai003/gemi01"

          # 准备 HF 专用文件
          shutil.copy("Dockerfile.hf", "Dockerfile")
          shutil.copy("README_HF.md", "README.md")

          # 上传整个仓库目录到 HF Space
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message="自动部署: 从 GitHub 同步",
          )

          print(f"✅ 成功推送到 {repo_id}")
          EOF
